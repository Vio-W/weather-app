<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ClimaCast — check live weather for any city, anywhere.">
  <meta name="theme-color" content="#020617">
  <meta property="og:title" content="ClimaCast">
  <meta property="og:description" content="Check live weather for any city, anywhere.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="/weather-app/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ClimaCast</title>
  <script type="module" crossorigin src="/weather-app/assets/index-BVZUV3cd.js"></script>
  <link rel="stylesheet" crossorigin href="/weather-app/assets/index-BPX9LgSU.css">
</head>
<body class="relative bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-5 font-sans overflow-x-hidden" style="opacity: 0; transition: opacity 0.2s ease;" onload="document.body.style.opacity='1'">

  <div class="fixed inset-0 -z-10 opacity-40" style="background-image: url('/weather-app/background.jpg'); background-size: cover; background-position: center;"></div>
  <div class="fixed inset-0 -z-10 bg-gradient-to-b from-slate-800/10 via-slate-800/30 to-slate-800/80"></div>
  <header class="relative z-10 w-full mx-auto flex items-center gap-3 pb-6 pl-8 pt-4 border-b border-slate-900">
    <div class="group inline-flex items-center gap-2 cursor-default">
      <span class="font-display text-3xl sm:text-4xl font-extrabold tracking-tight text-white transition-colors duration-300 group-hover:text-blue-300">ClimaCast</span>
      <span class="w-7 h-7 sm:w-8 sm:h-8 text-amber-400 transition-transform duration-700 ease-out group-hover:rotate-180">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="w-full h-full">
          <circle cx="12" cy="12" r="4.5"/>
          <line x1="12" y1="2.5" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="21.5"/>
          <line x1="4.2" y1="4.2" x2="5.9" y2="5.9"/>
          <line x1="18.1" y1="18.1" x2="19.8" y2="19.8"/>
          <line x1="2.5" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="21.5" y2="12"/>
          <line x1="4.2" y1="19.8" x2="5.9" y2="18.1"/>
          <line x1="18.1" y1="5.9" x2="19.8" y2="4.2"/>
        </svg>
      </span>
      <span class="w-6 h-6 sm:w-7 sm:h-7 text-slate-300 -ml-3 transition-transform duration-500 ease-out group-hover:translate-x-1 group-hover:-translate-y-0.5">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
          <path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.4-2A5 5 0 0 0 6.5 19h11z"/>
        </svg>
      </span>
    </div>
  </header>

  <main class="relative z-10 flex-1 flex flex-col items-center justify-center w-full max-w-4xl mx-auto py-10">
    <div id="hero-panel" class="relative overflow-hidden w-full bg-slate-900/90 backdrop-blur-sm border border-slate-800/80 rounded-3xl p-6 sm:p-8 md:p-12 shadow-2xl">

      <div id="spotlight" class="pointer-events-none absolute inset-0 opacity-0 transition-opacity duration-300"></div>

      <div class="relative z-10 flex flex-col items-center text-center gap-6 sm:gap-8">

        <div class="max-w-md">
          <h1 class="text-xl sm:text-2xl md:text-3xl font-extrabold tracking-tight text-slate-100 leading-snug">
            Discover the weather in every city you embark on
          </h1>
        </div>

        <div class="w-full max-w-md flex flex-col gap-2">
          <div class="flex items-center w-full" role="search">
            <input
              id="city-input"
              type="text"
              placeholder="Search for a city..."
              class="w-full h-12 px-5 border border-slate-800 bg-slate-950 text-slate-100 placeholder-slate-600 rounded-l-2xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 hover:border-slate-700 transition-all duration-300 text-sm"
              />
              <button id="weather-search-btn" class="relative overflow-hidden h-12 px-6 bg-blue-600 hover:bg-blue-700 hover:scale-105 active:scale-95 hover:shadow-lg hover:shadow-blue-600/30 text-white font-bold shrink-0 rounded-r-2xl cursor-pointer transition-all duration-200 text-sm">
                Search
              </button>
          </div>
          <p id="search-error" class="hidden text-xs text-red-400 text-left px-1"></p>
        </div>

        <div id="weather-card" class="flex justify-center -space-x-4 sm:-space-x-10 w-full max-w-xl items-end [perspective:1000px]">
          <div class="relative z-0 w-24 sm:w-32 bg-slate-900/80 border border-slate-700/50 rounded-2xl p-3 sm:p-4 text-center shadow-xl backdrop-blur-sm rotate-[-8deg] translate-y-6 opacity-80 transition-all duration-300 ease-out hover:rotate-0 hover:scale-110 hover:-translate-y-2 hover:z-30 hover:opacity-100 hover:border-blue-400/50 hover:shadow-blue-500/20 cursor-default">
            <div class="w-6 h-6 sm:w-7 sm:h-7 mx-auto text-slate-400 icon-float">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                <path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.4-2A5 5 0 0 0 6.5 19h11z"/>
              </svg>
            </div>
            <div class="text-base sm:text-lg font-bold text-slate-300 mt-1">18°</div>
          </div>

          <div id="fan-center" class="relative z-20 w-32 sm:w-44 bg-slate-900 border border-blue-500/40 rounded-2xl p-4 sm:p-6 text-center shadow-2xl shadow-blue-950/60 scale-110 transition-transform duration-150 ease-out cursor-default [transform-style:preserve-3d]">
            <div class="w-9 h-9 sm:w-11 sm:h-11 mx-auto text-blue-300 icon-float">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                <path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.4-2A5 5 0 0 0 6.5 19h11z"/>
              </svg>
            </div>
            <div class="text-3xl sm:text-4xl font-black text-white tracking-tight mt-2">26°</div>
            <div class="text-xs font-bold text-slate-300 mt-1 truncate">Phnom Penh</div>
          </div>

          <div class="relative z-0 w-24 sm:w-32 bg-slate-900/80 border border-slate-700/50 rounded-2xl p-3 sm:p-4 text-center shadow-xl backdrop-blur-sm rotate-[8deg] translate-y-6 opacity-80 transition-all duration-300 ease-out hover:rotate-0 hover:scale-110 hover:-translate-y-2 hover:z-30 hover:opacity-100 hover:border-blue-400/50 hover:shadow-blue-500/20 cursor-default">
            <div class="w-6 h-6 sm:w-7 sm:h-7 mx-auto text-amber-400 icon-spin-slow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="w-full h-full">
                <circle cx="12" cy="12" r="4.5"/>
                <line x1="12" y1="2.5" x2="12" y2="5"/>
                <line x1="12" y1="19" x2="12" y2="21.5"/>
                <line x1="4.2" y1="4.2" x2="5.9" y2="5.9"/>
                <line x1="18.1" y1="18.1" x2="19.8" y2="19.8"/>
                <line x1="2.5" y1="12" x2="5" y2="12"/>
                <line x1="19" y1="12" x2="21.5" y2="12"/>
                <line x1="4.2" y1="19.8" x2="5.9" y2="18.1"/>
                <line x1="18.1" y1="5.9" x2="19.8" y2="4.2"/>
              </svg>
            </div>
            <div class="text-base sm:text-lg font-bold text-slate-300 mt-1">32°</div>
          </div>
        </div>

        <div id="search-result" class="hidden w-full max-w-md flex flex-col items-center gap-5 sm:gap-6 animate-fade-in" aria-live="polite">
          <div class="w-full bg-slate-950 border border-blue-500/30 rounded-3xl p-6 sm:p-8 text-center shadow-2xl shadow-blue-950/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-blue-500/20">
            <div id="result-icon" class="w-12 h-12 sm:w-14 sm:h-14 mx-auto text-slate-300"></div>
            <div id="result-temp" class="text-5xl sm:text-6xl font-black text-white tracking-tight mt-3">--°</div>
            <div id="result-city" class="text-base sm:text-lg font-bold text-slate-200 mt-2"></div>
            <div id="result-condition" class="text-sm text-slate-400 mt-1"></div>
          </div>
          <div class="grid grid-cols-3 gap-2 sm:gap-3 w-full">
            <div class="bg-slate-900/60 border border-slate-800/60 rounded-xl p-2 sm:p-3 text-center transition-all duration-300 hover:-translate-y-0.5 hover:border-blue-500/40 hover:bg-slate-900 cursor-default">
              <div class="text-[9px] sm:text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Feels like</div>
              <div id="result-feels" class="text-sm sm:text-base font-bold text-slate-200 mt-1">--°</div>
            </div>
            <div class="bg-slate-900/60 border border-slate-800/60 rounded-xl p-2 sm:p-3 text-center transition-all duration-300 hover:-translate-y-0.5 hover:border-blue-500/40 hover:bg-slate-900 cursor-default">
              <div class="text-[9px] sm:text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Humidity</div>
              <div id="result-humidity" class="text-sm sm:text-base font-bold text-slate-200 mt-1">--%</div>
            </div>
            <div class="bg-slate-900/60 border border-slate-800/60 rounded-xl p-2 sm:p-3 text-center transition-all duration-300 hover:-translate-y-0.5 hover:border-blue-500/40 hover:bg-slate-900 cursor-default">
              <div class="text-[9px] sm:text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Wind</div>
              <div id="result-wind" class="text-sm sm:text-base font-bold text-slate-200 mt-1">-- m/s</div>
            </div>
          </div>
          <button id="reset-btn" class="relative text-xs text-slate-500 hover:text-slate-300 transition-colors duration-300 after:absolute after:left-0 after:-bottom-0.5 after:h-px after:w-0 after:bg-slate-300 after:transition-all after:duration-300 hover:after:w-full">
            ← Search another city
          </button>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
