<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCast Weather</title>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-5">

  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-8 flex flex-col items-center gap-6">
    <div class="text-center">
      <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
        SkyCast Weather
      </h1>
      <p class="text-xs text-slate-500 mt-1">Enter a city to check the forecast</p>
    </div>

    <div class="flex items-center w-full" role="search">
      <input
        id="city-input" 
        type="text" 
        placeholder="Search city e.g., Paris..." 
        class="w-full h-12 px-4 border border-slate-800 bg-slate-950 text-slate-100 placeholder-slate-600 rounded-l-2xl focus:outline-none focus:border-blue-500 transition-colors text-sm"
      />
      <button id="weather-search-btn" class="h-12 px-5 bg-blue-600 hover:bg-blue-700 text-white font-bold shrink-0 rounded-r-2xl cursor-pointer transition-colors text-sm">
        Search
      </button>
    </div>

    <div id="weather-card" class="hidden w-full bg-slate-950 border border-slate-800 rounded-2xl p-6 flex flex-col items-center text-center"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
